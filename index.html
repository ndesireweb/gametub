<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMETUB – Actus PC, Consoles, Jeux</title>
    <style>
        :root {
            --bg: #0a0a10;
            --surface: #141428;
            --text: #e0e0e0;
            --accent: #0ef;
            --accent2: #a020f0;
            --gradient: linear-gradient(135deg, #0ef, #a020f0);
            --border: #252545;
            --card-bg: #1c1c3a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1rem;
        }
        nav {
            width: 100%; max-width: 900px; background: var(--surface); border-radius: 2rem;
            border: 1px solid var(--border); display: flex; justify-content: center; gap: 2rem;
            padding: 0.6rem; margin-bottom: 2rem;
        }
        nav a {
            text-decoration: none; color: #aaa; font-weight: 600; padding: 0.5rem 1.5rem;
            border-radius: 2rem; transition: 0.2s; display: flex; align-items: center; gap: 0.4rem;
        }
        nav a:hover { color: white; background: rgba(255,255,255,0.05); }
        nav a.active { background: var(--gradient); color: #000; box-shadow: 0 0 15px rgba(0,238,255,0.4); }
        .container { width: 100%; max-width: 1200px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; }
        .tab-btn {
            background: var(--surface); border: 1px solid var(--border); color: #ccc;
            padding: 0.5rem 1.2rem; border-radius: 2rem; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 0.4rem;
        }
        .tab-btn:hover { border-color: var(--accent); color: white; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .news-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem;
            padding: 1rem; display: flex; gap: 1rem; transition: 0.2s; cursor: pointer;
            text-decoration: none; color: inherit;
        }
        .news-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .thumbnail {
            width: 65px; height: 65px; border-radius: 0.8rem; background: #2a2a4a;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; overflow: hidden;
        }
        .thumbnail img { width:100%; height:100%; object-fit:cover; }
        .content { flex:1; min-width:0; }
        .news-title {
            font-weight: 600; font-size: 0.95rem; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 0.4rem;
        }
        .meta { font-size: 0.75rem; color: #aaa; display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .source-badge {
            background: rgba(160,32,240,0.2); color: var(--accent2); padding: 0.15rem 0.6rem;
            border-radius: 1rem; font-weight: 600;
        }
        .score { display: flex; align-items: center; gap: 0.2rem; }
        .loading-state { grid-column: 1/-1; text-align: center; padding: 3rem; }
        .spinner {
            width: 2.5rem; height: 2.5rem; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .discussion-section { display: none; background: var(--surface); border-radius: 1rem; padding: 1rem; margin-top: 1rem; }
        .discussion-section.active { display: block; }
        .chat-messages {
            height: 400px; overflow-y: auto; margin-bottom: 1rem; padding-right: 0.5rem;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .message {
            background: rgba(255,255,255,0.05); border-radius: 0.8rem; padding: 0.6rem 0.9rem;
            max-width: 80%; align-self: flex-start; word-break: break-word;
        }
        .message.own { align-self: flex-end; background: rgba(0,238,255,0.1); border: 1px solid var(--accent); }
        .message .author { font-weight: bold; color: var(--accent); margin-bottom:0.2rem; font-size:0.8rem; }
        .message .text { font-size:0.95rem; }
        .message .time { font-size:0.7rem; color:#999; margin-top:0.3rem; }
        .chat-form { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .chat-form input {
            flex:1; min-width:120px; padding:0.6rem 1rem; border-radius:2rem;
            border:1px solid var(--border); background:var(--card-bg); color:white;
        }
        .chat-form button {
            background:var(--gradient); border:none; color:#000; font-weight:bold;
            padding:0.6rem 1.5rem; border-radius:2rem; cursor:pointer;
        }
        footer { margin-top:1.5rem; color:#555; font-size:0.8rem; }
        @media (max-width:600px) {
            nav { gap:0.5rem; } nav a { font-size:0.85rem; padding:0.4rem 1rem; }
        }
    </style>
</head>
<body>
<nav>
    <a href="/gametub/" data-route="/gametub/" class="active">📡 Actualités</a>
    <a href="/gametub/discussion" data-route="/gametub/discussion">💬 Discussion</a>
</nav>

<div class="container" id="appContainer">
    <div id="newsSection">
        <div class="tabs" id="tabContainer">
            <button class="tab-btn active" data-filter="all">🌍 Tout</button>
            <button class="tab-btn" data-filter="PS5">🎮 PlayStation</button>
            <button class="tab-btn" data-filter="XboxSeriesX">🟢 Xbox</button>
            <button class="tab-btn" data-filter="NintendoSwitch">🔴 Nintendo</button>
            <button class="tab-btn" data-filter="PC">💻 PC</button>
            <button class="tab-btn" data-filter="general">🎲 Général</button>
        </div>
        <div class="news-grid" id="newsGrid">
            <div class="loading-state"><div class="spinner"></div>Récupération des actus (Reddit + flux RSS)…</div>
        </div>
        <footer>Sources : Reddit, IGN, GameSpot, Polygon, Kotaku, Eurogamer… · <span id="lastUpdate"></span></footer>
    </div>

    <div class="discussion-section" id="discussionSection">
        <h2 style="margin-bottom:1rem;">🗨️ Discussion générale</h2>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-form">
            <input type="text" id="usernameInput" placeholder="Pseudo" maxlength="20">
            <input type="text" id="messageInput" placeholder="Votre message..." maxlength="500">
            <button id="sendBtn">Envoyer</button>
        </div>
        <p style="font-size:0.7rem;color:#666;margin-top:0.5rem;">Chat stocké localement (votre navigateur).</p>
    </div>
</div>

<script>
(function() {
    // ===== CONFIG =====
    const BASE_PATH = '/gametub'; // Change si tu héberges à la racine "/"
    
    // Reddit (CORS OK)
    const REDDIT_SOURCES = [
        { id:'PS5', sub:'PS5', icon:'🎮' },
        { id:'XboxSeriesX', sub:'XboxSeriesX', icon:'🟢' },
        { id:'NintendoSwitch', sub:'NintendoSwitch', icon:'🔴' },
        { id:'PC', sub:'pcmasterrace', icon:'💻' },
        { id:'PC', sub:'pcgaming', icon:'🖥️' },
        { id:'general', sub:'gaming', icon:'🎲' },
        { id:'general', sub:'Games', icon:'🎮' }
    ];

    // Flux RSS (passent par proxy CORS)
    const RSS_SOURCES = [
        { name:'IGN', url:'https://feeds.feedburner.com/ign/all', icon:'🔥' },
        { name:'GameSpot', url:'https://www.gamespot.com/feeds/mashup/', icon:'🎯' },
        { name:'Polygon', url:'https://www.polygon.com/rss/index.xml', icon:'🔷' },
        { name:'Kotaku', url:'https://kotaku.com/rss', icon:'🟣' },
        { name:'Eurogamer', url:'https://www.eurogamer.net/?format=rss', icon:'🌍' },
        { name:'PC Gamer', url:'https://www.pcgamer.com/rss/', icon:'🖥️' },
        { name:'Nintendo Life', url:'https://www.nintendolife.com/feeds/latest', icon:'🍄' },
        { name:'Push Square', url:'https://www.pushsquare.com/feeds/latest', icon:'▫️' },
        { name:'Pure Xbox', url:'https://www.purexbox.com/feeds/latest', icon:'❎' }
    ];

    // Proxys CORS publics (priorité)
    const CORS_PROXIES = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://api.codetabs.com/v1/proxy?quest='
    ];

    // ===== ÉTAT =====
    let allArticles = [];
    let activeFilter = 'all';
    let currentRoute = BASE_PATH + '/';

    // ===== DOM =====
    const newsGrid = document.getElementById('newsGrid');
    const lastUpdateSpan = document.getElementById('lastUpdate');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const navLinks = document.querySelectorAll('nav a');
    const newsSection = document.getElementById('newsSection');
    const discussionSection = document.getElementById('discussionSection');
    const chatMessages = document.getElementById('chatMessages');
    const usernameInput = document.getElementById('usernameInput');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // ===== REDDIT DIRECT =====
    async function fetchReddit(sub) {
        const url = `https://www.reddit.com/r/${sub}/hot.json?limit=20&raw_json=1`;
        const res = await fetch(url, { headers: { 'User-Agent': 'GameTub/1.0' } });
        if (!res.ok) return [];
        const json = await res.json();
        return json.data.children.map(c => {
            const p = c.data;
            const src = REDDIT_SOURCES.find(s => s.sub === sub);
            return {
                title: p.title,
                url: `https://www.reddit.com${p.permalink}`,
                score: p.score,
                comments: p.num_comments,
                thumbnail: (p.thumbnail && p.thumbnail.startsWith('http')) ? p.thumbnail : null,
                sourceName: `r/${sub}`,
                sourceIcon: src ? src.icon : '📌',
                categoryId: src ? src.id : 'general',
                date: new Date(p.created_utc * 1000).toISOString()
            };
        });
    }

    // ===== RSS VIA PROXY (avec fallback) =====
    async function fetchRSS(source) {
        const url = source.url;
        // Essaie chaque proxy jusqu'à ce que ça passe
        for (const proxy of CORS_PROXIES) {
            try {
                const proxyUrl = proxy + encodeURIComponent(url);
                const res = await fetch(proxyUrl);
                if (!res.ok) continue;
                const xmlText = await res.text();
                const articles = parseRSS(xmlText, source);
                if (articles.length > 0) return articles;
            } catch (e) {
                continue;
            }
        }
        return []; // tous les proxys ont échoué
    }

    function parseRSS(xmlText, source) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
        const items = xmlDoc.querySelectorAll('item');
        const articles = [];
        items.forEach(item => {
            const title = item.querySelector('title')?.textContent?.trim();
            const link = item.querySelector('link')?.textContent?.trim();
            const pubDate = item.querySelector('pubDate')?.textContent;
            if (!title || !link) return;
            let thumbnail = null;
            // media:content ou enclosure
            const media = item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'content')[0];
            if (media && media.getAttribute('url')) thumbnail = media.getAttribute('url');
            else {
                const enclosure = item.querySelector('enclosure');
                if (enclosure && enclosure.getAttribute('url')) thumbnail = enclosure.getAttribute('url');
            }
            articles.push({
                title: decodeHTML(title),
                url: link,
                score: 0,
                comments: 0,
                thumbnail,
                sourceName: source.name,
                sourceIcon: source.icon,
                categoryId: guessCategory(title, source.name),
                date: pubDate ? new Date(pubDate).toISOString() : new Date().toISOString()
            });
        });
        return articles;
    }

    function decodeHTML(html) {
        const txt = document.createElement('textarea');
        txt.innerHTML = html;
        return txt.value;
    }

    function guessCategory(title, sourceName) {
        const t = title.toLowerCase();
        if (/ps5|playstation|dualsense|ps plus/i.test(t)) return 'PS5';
        if (/xbox|series x|game pass/i.test(t)) return 'XboxSeriesX';
        if (/nintendo|switch|mario|zelda|pokémon/i.test(t)) return 'NintendoSwitch';
        if (/pc|steam|epic games/i.test(t)) return 'PC';
        return 'general';
    }

    // ===== DÉDOUBLONNAGE =====
    function normalizeTitle(str) {
        return str.toLowerCase().replace(/[^a-z0-9à-ü]/g, '').trim().substring(0, 60);
    }

    function deduplicate(articles) {
        const seen = new Set();
        return articles.filter(a => {
            const norm = normalizeTitle(a.title);
            if (seen.has(norm)) return false;
            seen.add(norm);
            return true;
        });
    }

    // ===== CHARGEMENT PRINCIPAL =====
    async function loadAllNews() {
        newsGrid.innerHTML = '<div class="loading-state"><div class="spinner"></div>Connexion à Reddit + flux RSS…</div>';
        try {
            // Reddit en parallèle
            const uniqueSubs = [...new Set(REDDIT_SOURCES.map(s => s.sub))];
            const redditPromises = uniqueSubs.map(sub => fetchReddit(sub).catch(() => []));
            const rssPromises = RSS_SOURCES.map(src => fetchRSS(src));

            const [redditResults, rssResults] = await Promise.all([
                Promise.all(redditPromises),
                Promise.all(rssPromises)
            ]);

            const combined = [...redditResults.flat(), ...rssResults.flat()];
            allArticles = deduplicate(combined);
            // Tri par date décroissante puis score
            allArticles.sort((a, b) => {
                const da = new Date(a.date).getTime() || 0;
                const db = new Date(b.date).getTime() || 0;
                if (db !== da) return db - da;
                return (b.score || 0) - (a.score || 0);
            });
            lastUpdateSpan.textContent = new Date().toLocaleTimeString('fr-FR');
            applyFilter(activeFilter);
        } catch (err) {
            newsGrid.innerHTML = `<div class="loading-state" style="color:#ff6b6b">⚠️ Erreur : ${err.message}</div>`;
        }
    }

    // ===== AFFICHAGE =====
    function applyFilter(filter) {
        let filtered = filter === 'all' ? allArticles : allArticles.filter(a => a.categoryId === filter);
        if (filtered.length === 0) {
            newsGrid.innerHTML = '<div class="loading-state">Aucune actualité trouvée.</div>';
            return;
        }
        newsGrid.innerHTML = filtered.map(art => {
            const thumbHtml = (art.thumbnail) 
                ? `<img src="${art.thumbnail}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${art.sourceIcon||'📰'}';" loading="lazy">`
                : (art.sourceIcon || '📰');
            const scoreF = art.score > 1000 ? (art.score/1000).toFixed(1)+'k' : art.score;
            const commentsF = art.comments > 1000 ? (art.comments/1000).toFixed(1)+'k' : art.comments;
            return `
            <div class="news-card" onclick="window.open('${art.url}','_blank')" title="${escapeHTML(art.title)}">
                <div class="thumbnail">${thumbHtml}</div>
                <div class="content">
                    <div class="news-title">${escapeHTML(art.title)}</div>
                    <div class="meta">
                        <span class="source-badge">${art.sourceIcon} ${escapeHTML(art.sourceName)}</span>
                        ${art.score ? `<span class="score">⬆️ ${scoreF}</span>` : ''}
                        ${art.comments ? `<span>💬 ${commentsF}</span>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ===== ONGLETS =====
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            applyFilter(activeFilter);
        });
    });

    // ===== DISCUSSION (localStorage) =====
    function getMessages() {
        try { return JSON.parse(localStorage.getItem('gametub_chat') || '[]'); } catch { return []; }
    }
    function saveMessages(msgs) { localStorage.setItem('gametub_chat', JSON.stringify(msgs)); }
    function renderChat() {
        const msgs = getMessages();
        chatMessages.innerHTML = msgs.map(m => {
            const isOwn = usernameInput.value.trim() && m.author === usernameInput.value.trim();
            return `<div class="message ${isOwn ? 'own' : ''}">
                <div class="author">${escapeHTML(m.author)}</div>
                <div class="text">${escapeHTML(m.text)}</div>
                <div class="time">${new Date(m.timestamp).toLocaleString('fr-FR')}</div>
            </div>`;
        }).join('');
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    function sendMessage() {
        const author = usernameInput.value.trim();
        const text = messageInput.value.trim();
        if (!author || !text) return;
        const messages = getMessages();
        messages.push({ author, text, timestamp: Date.now() });
        if (messages.length > 200) messages.shift();
        saveMessages(messages);
        messageInput.value = '';
        renderChat();
    }
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    // ===== ROUTEUR (gère les URLs propres) =====
    function route(path) {
        currentRoute = path;
        navLinks.forEach(link => {
            link.classList.toggle('active', link.dataset.route === path);
        });
        if (path === BASE_PATH + '/discussion') {
            newsSection.style.display = 'none';
            discussionSection.classList.add('active');
            renderChat();
        } else {
            newsSection.style.display = 'block';
            discussionSection.classList.remove('active');
            if (allArticles.length === 0) loadAllNews();
        }
    }

    navLinks.forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const path = link.dataset.route;
            history.pushState({}, '', path);
            route(path);
        });
    });
    window.addEventListener('popstate', () => route(location.pathname));

    // ===== INITIALISATION =====
    (function init() {
        const path = location.pathname;
        // Gère la redirection depuis 404.html pour les URLs propres
        if (sessionStorage.redirect) {
            const redirected = sessionStorage.redirect;
            delete sessionStorage.redirect;
            history.replaceState({}, '', redirected);
            route(redirected);
        } else {
            route(path);
            if (path === BASE_PATH + '/' || path === BASE_PATH + '/index.html') loadAllNews();
        }
    })();

    // Rechargement auto toutes les 15 min
    setInterval(() => {
        if (currentRoute === BASE_PATH + '/' || currentRoute === BASE_PATH + '/index.html') loadAllNews();
    }, 15 * 60 * 1000);
})();
</script>
</body>
</html>
